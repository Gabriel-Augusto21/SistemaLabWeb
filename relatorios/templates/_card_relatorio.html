<div class="col-md-4 col-sm-6">
  <div class="card h-100 border-{{ cor }} shadow-sm">
    <div class="card-header bg-{{ cor }} text-{% if cor == 'warning' %}dark{% else %}white{% endif %} py-2">
      <i class="{{ icone }}"></i> {{ titulo }}
    </div>
    <div class="card-body d-flex flex-column">
      <p class="small text-muted flex-grow-1">{{ descricao }}</p>
      <div class="d-flex gap-2 mt-auto">
        <a href="{% url url_name %}" class="btn btn-sm btn-outline-{{ cor }}">
          <i class="fas fa-eye"></i> Ver
        </a>
        <a href="{% url url_name %}?pdf=1" class="btn btn-sm btn-danger">
          <i class="fas fa-file-pdf"></i> PDF
        </a>
      </div>
    </div>
  </div>
</div>
