{% extends "master.html" %}

{% block title %}Home - Laboratório HP2{% endblock %}

{% block content %}

<style>
    body {
        background-color: #ffffff;
    }

    .page-header {
        margin-bottom: 40px;
        padding: 30px;
        background-color: #f5f5f5;
        border-radius: 12px;
        opacity: 0;
        transform: translateY(-10px);
        transition: 0.6s ease;
    }

    .page-header.show {
        opacity: 1;
        transform: translateY(0);
    }

    .page-header h1 {
        color: #000;
        font-weight: 600;
    }

    .custom-card {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 16px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.04);
        transition: 0.3s ease;
        opacity: 0;
        transform: translateY(20px);
    }

    .custom-card.show {
        opacity: 1;
        transform: translateY(0);
    }

    .custom-card.hovered {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .custom-card.clicked {
        transform: scale(0.97);
    }

    .custom-card i {
        color: #333;
    }

    .custom-btn {
        background-color: #444;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 18px;
        transition: 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .custom-btn:hover {
        background-color: #222;
    }

    .custom-btn:active {
        transform: scale(0.95);
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple 0.6s linear;
        background-color: rgba(255,255,255,0.4);
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }
</style>

<div class="page-header" id="header">
    <h1><i class="fas fa-home"></i> Bem-vindo ao Laboratório HP2</h1>
</div>

<div class="row mb-4">

    <div class="col-md-3 mb-4">
        <div class="card text-center custom-card">
            <div class="card-body">
                <i class="fas fa-user-md fa-3x mb-3"></i>
                <h5>Dentistas</h5>
                <p>Gerenciar dentistas</p>
                <a href="{% url 'dentista:dentista' %}" class="custom-btn">Acessar</a>
            </div>
        </div>
    </div>

    <!-- <div class="col-md-3 mb-4">
        <div class="card text-center custom-card">
            <div class="card-body">
                <i class="fas fa-tooth fa-3x mb-3"></i>
                <h5>Laboratórios</h5>
                <p>Gerenciar laboratórios</p>
                <a href="{% url 'laboratorio:laboratorio' %}" class="custom-btn">Acessar</a>
            </div>
        </div>
    </div> -->

    <!-- <div class="col-md-3 mb-4">
        <div class="card text-center custom-card">
            <div class="card-body">
                <i class="fas fa-users fa-3x mb-3"></i>
                <h5>Pacientes</h5>
                <p>Gerenciar pacientes</p>
                <a href="{% url 'cliente:cliente' %}" class="custom-btn">Acessar</a>
            </div>
        </div>
    </div> -->

    <div class="col-md-3 mb-4">
        <div class="card text-center custom-card">
            <div class="card-body">
                <i class="fas fa-wrench fa-3x mb-3"></i>
                <h5>Serviços</h5>
                <p>Gerenciar serviços</p>
                <a href="{% url 'servico:servico' %}" class="custom-btn">Acessar</a>
            </div>
        </div>
    </div>

    <div class="col-md-3 mb-4">
        <div class="card text-center custom-card">
            <div class="card-body">
                <i class="fas fa-calendar fa-3x mb-3"></i>
                <h5>Calendário</h5>
                <p>Gerenciar calendário</p>
                <a href="{% url 'cronograma:cronograma' %}" class="custom-btn">Acessar</a>
            </div>
        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("header").classList.add("show");

    const cards = document.querySelectorAll(".custom-card");
    cards.forEach((card, i) => {
        setTimeout(() => card.classList.add("show"), i * 120);

        card.addEventListener("mouseenter", () => card.classList.add("hovered"));
        card.addEventListener("mouseleave", () => card.classList.remove("hovered"));
        card.addEventListener("mousedown", () => card.classList.add("clicked"));
        card.addEventListener("mouseup", () => card.classList.remove("clicked"));
    });

    document.querySelectorAll(".custom-btn").forEach(btn => {
        btn.addEventListener("click", e => {
            const ripple = document.createElement("span");
            const size = Math.max(btn.clientWidth, btn.clientHeight);
            ripple.style.width = ripple.style.height = size + "px";
            ripple.style.left = e.offsetX - size / 2 + "px";
            ripple.style.top = e.offsetY - size / 2 + "px";
            ripple.classList.add("ripple");
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });

});
</script>

{% endblock %}
