{% extends "master.html" %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-exclamation-triangle"></i> Confirmar Exclusão</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="fas fa-warning"></i> Atenção!
            </div>
            <div class="card-body">
                <p>Tem certeza que deseja deletar <strong>{{ cronograma.titulo }}</strong>?</p>
                <p class="text-danger small">Esta ação não pode ser desfeita!</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Sim, deletar
                        </button>
                        <a href="{% url 'cronograma:detalhe_cronograma' cronograma.pk %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
