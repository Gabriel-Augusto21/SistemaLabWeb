{% extends "master.html" %}

{% block title %}{% if edit %}Editar{% else %}Nova{% endif %} Saída{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if edit %}<i class="fas fa-edit"></i> Editar Saída{% else %}<i class="fas fa-plus"></i> Nova Saída{% endif %}</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-form"></i> Formulário de Saída
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="tipo" class="form-label">Tipo *</label>
                        <input type="text" class="form-control" id="tipo" name="tipo"
                               value="{% if saida %}{{ saida.tipo }}{% endif %}"
                               placeholder="Ex: Aluguel, Material, Salário..." required>
                    </div>

                    <div class="mb-3">
                        <label for="valor" class="form-label">Valor *</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" class="form-control" id="valor" name="valor"
                                   step="0.01" min="0"
                                   value="{% if saida %}{{ saida.valor }}{% endif %}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="data" class="form-label">Data *</label>
                        <input type="date" class="form-control" id="data" name="data"
                               value="{% if saida %}{{ saida.data|date:'Y-m-d' }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3"
                                  placeholder="Observações adicionais (opcional)">{% if saida %}{{ saida.descricao }}{% endif %}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                        <a href="{% url 'saida:saida' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
